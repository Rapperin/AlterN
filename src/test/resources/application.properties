spring.datasource.url=jdbc:h2:mem:altern;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
altern.security.jwt.secret=altern-test-secret-key-change-me-before-production-2026
altern.security.jwt.expiration-ms=86400000
