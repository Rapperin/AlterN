spring.application.name=altern
server.port=8081
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger
spring.datasource.url=jdbc:postgresql://localhost:5432/altern_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
altern.security.jwt.secret=altern-super-secret-key-change-me-before-production-2026
altern.security.jwt.expiration-ms=86400000
altern.judge.async.enabled=false
altern.judge.async.pool-size=2
altern.runner.docker.enabled=false
altern.runner.docker.binary=docker
altern.runner.docker.memory-limit-mb=256
altern.runner.docker.cpu-limit=1.0
altern.runner.docker.compile-timeout-ms=10000
altern.runner.docker.java-image=eclipse-temurin:17-jdk
altern.runner.docker.python-image=python:3.11-alpine
altern.runner.docker.cpp-image=gcc:13
